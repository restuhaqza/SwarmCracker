name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run tests
        run: go test -short -race ./pkg/config/ ./pkg/executor/ ./pkg/network/ ./pkg/security/ ./pkg/translator/ ./pkg/swarmkit/ ./pkg/types/

      - name: Build release binaries
        env:
          VERSION: ${{ github.ref_name }}
          BUILD_TIME: ${{ github.event.head_commit.timestamp }}
          GIT_COMMIT: ${{ github.sha }}
        run: |
          mkdir -p dist

          # Build for each platform (SwarmCracker is Linux-only: requires KVM, Firecracker, TAP)
          platforms="linux/amd64 linux/arm64"
          binaries="swarmcracker swarmd-firecracker swarmcracker-agent"

          for platform in $platforms; do
            os=$(echo $platform | cut -d/ -f1)
            arch=$(echo $platform | cut -d/ -f2)
            echo "=== Building $os/$arch ==="

            pkg_dir="dist/swarmcracker-${VERSION}-${os}-${arch}"
            mkdir -p "$pkg_dir"

            for bin in $binaries; do
              echo "  Building $bin..."
              CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build \
                -ldflags "-X main.Version=${VERSION} -X main.BuildTime=${BUILD_TIME} -X main.GitCommit=${GIT_COMMIT}" \
                -o "${pkg_dir}/${bin}" \
                ./cmd/${bin}
            done

            # Copy LICENSE and README
            cp LICENSE README.md "$pkg_dir/"

            # Create tarball
            tar -czf "dist/swarmcracker-${VERSION}-${os}-${arch}.tar.gz" \
              -C dist "swarmcracker-${VERSION}-${os}-${arch}"

            echo "  ✅ dist/swarmcracker-${VERSION}-${os}-${arch}.tar.gz"
          done

      - name: Smoke test binaries
        run: |
          echo "=== Verifying required features are present in built binaries ==="

          # Test swarmd-firecracker
          echo "--- swarmd-firecracker ---"
          SWARMD_HELP=$(./dist/swarmcracker-*-linux-amd64/swarmd-firecracker --help 2>&1 || true)

          REQUIRED_FLAGS=(
            "enable-cni"
            "manager"
            "join-addr"
            "join-token"
            "kernel-path"
            "rootfs-dir"
            "bridge-name"
            "bridge-ip"
            "subnet"
            "nat-enabled"
            "consul-enabled"
            "health-addr"
            "enable-vxlan"
          )

          MISSING=0
          for flag in "${REQUIRED_FLAGS[@]}"; do
            if echo "$SWARMD_HELP" | grep -q -- "-$flag"; then
              echo "  ✅ --$flag"
            else
              echo "  ❌ MISSING: --$flag"
              MISSING=1
            fi
          done

          # Test swarmcracker CLI
          echo "--- swarmcracker ---"
          CRACKER_HELP=$(./dist/swarmcracker-*-linux-amd64/swarmcracker --help 2>&1 || true)

          REQUIRED_SUBCOMMANDS=(
            "cluster"
            "node"
            "service"
            "task"
            "vm"
            "network"
            "volume"
            "config"
            "setup"
          )

          for cmd_name in "${REQUIRED_SUBCOMMANDS[@]}"; do
            if echo "$CRACKER_HELP" | grep -q " $cmd_name "; then
              echo "  ✅ $cmd_name"
            else
              echo "  ❌ MISSING: $cmd_name"
              MISSING=1
            fi
          done

          if [ "$MISSING" -eq 1 ]; then
            echo ""
            echo "❌ SMOKE TEST FAILED: Release binary is missing required features!"
            echo "   This means the binary was built from a commit that predates critical flags."
            exit 1
          fi

          echo ""
          echo "✅ All required CLI flags and subcommands present"

      - name: Clean intermediate directories
        run: rm -rf dist/swarmcracker-${{ github.ref_name }}

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.tar.gz > checksums.txt

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag (if any)
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)

          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "${{ github.ref_name }}" ]; then
            echo "## What's Changed" > changelog.txt
            echo "" >> changelog.txt
            git log ${PREV_TAG}..${{ github.ref_name }} --pretty=format:"- %s (%h)" --no-merges >> changelog.txt
            echo "" >> changelog.txt
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}" >> changelog.txt
          else
            echo "## Initial Release" > changelog.txt
            echo "" >> changelog.txt
            git log --pretty=format:"- %s (%h)" --no-merges >> changelog.txt
          fi

          # Add platform support note
          echo "" >> changelog.txt
          echo "## 🐧 Platform Support" >> changelog.txt
          echo "" >> changelog.txt
          echo "**Supported Platforms:**" >> changelog.txt
          echo "- ✅ Linux amd64 (x86_64)" >> changelog.txt
          echo "- ✅ Linux arm64 (AArch64)" >> changelog.txt
          echo "" >> changelog.txt
          echo "**Requirements:**" >> changelog.txt
          echo "- KVM support (/dev/kvm)" >> changelog.txt
          echo "- Linux kernel 4.14+" >> changelog.txt
          echo "- Firecracker v1.14+" >> changelog.txt
          echo "" >> changelog.txt
          echo "*Note: macOS and Windows are not supported. SwarmCracker requires KVM virtualization which is Linux-only.*" >> changelog.txt

          cat changelog.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          body_path: changelog.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
