run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - govet
    - staticcheck
    - ineffassign
    - typecheck
    - errcheck
    - gofmt
    - revive
    - gocyclo
    - gosec
    - nilerr
    - prealloc
    - noctx

linters-settings:
  gocyclo:
    min-complexity: 20
  revive:
    rules:
      - name: exported
        disabled: true
  errcheck:
    check-type-assertions: true
    check-blank: false

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude-rules:
    # Test files: allow unchecked errors, gosec warnings, high complexity, formatting
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - gocyclo
        - noctx
        - prealloc
        - gofmt
    # Test infrastructure (not unit tests but test helpers)
    - path: test/
      linters:
        - errcheck
        - gosec
        - gocyclo
    # Pre-existing errcheck/gosec noise in production code — fix incrementally
    - path: pkg/jailer/
      linters:
        - errcheck
        - gosec
    - path: pkg/swarmkit/
      linters:
        - errcheck
        - gosec
        - gocyclo
    - path: pkg/cni/
      linters:
        - errcheck
        - gosec
    - path: pkg/image/
      linters:
        - errcheck
        - gosec
        - gocyclo
    - path: pkg/snapshot/
      linters:
        - errcheck
        - gosec
        - noctx
    - path: pkg/lifecycle/
      linters:
        - errcheck
        - gosec
        - gocyclo
        - nilerr
    - path: pkg/storage/
      linters:
        - errcheck
        - gosec
    - path: pkg/network/
      linters:
        - errcheck
        - gosec
    - path: pkg/executor/
      linters:
        - errcheck
    - path: pkg/health/
      linters:
        - errcheck
    - path: pkg/runtime/
      linters:
        - errcheck
    - path: pkg/security/
      linters:
        - gosec
    - path: cmd/swarmcracker/
      linters:
        - errcheck
        - gosec
        - gocyclo
        - noctx
    - path: cmd/swarmd-firecracker/
      linters:
        - errcheck
        - gosec
        - gocyclo
    - path: cmd/swarmctl/
      linters:
        - errcheck
        - gosec
        - gocyclo
        - noctx
    - path: cmd/swarmcracker-cni/
      linters:
        - ineffassign
    - path: cmd/get-join-token/
      linters:
        - staticcheck
    - path: pkg/network/testhelpers/
      linters:
        - errcheck
    - path: test/e2e/
      linters:
        - ineffassign
    # Deprecated gRPC API — migrate in a dedicated PR
    - linters:
        - staticcheck
      text: "SA1019: grpc\\.Dial is deprecated"
    - linters:
        - staticcheck
      text: "SA1019: grpc\\.With(Insecure|Timeout|Dialer|Block) is deprecated"
    - linters:
        - staticcheck
      text: "SA1019: skel\\.PluginMain is deprecated"
    - linters:
        - staticcheck
      text: "SA1019: tar\\.TypeRegA has been deprecated"
    # Staticcheck SA1012 (nil context in tests), SA9003 (empty branch), SA4006 (unused)
    - linters:
        - staticcheck
      text: "SA1012: do not pass a nil Context"
    - linters:
        - staticcheck
      text: "SA9003: empty branch"
    - linters:
        - staticcheck
      text: "SA4006: this value of"
    - linters:
        - staticcheck
      text: "SA5011"
    # Pre-existing complexity — refactor incrementally
    - linters:
        - gocyclo
      path: pkg/network/manager\.go
    - linters:
        - gocyclo
      path: pkg/config/config\.go
    - linters:
        - gocyclo
      path: pkg/lifecycle/
    - linters:
        - gocyclo
      path: pkg/runtime/
    # Pre-existing prealloc suggestions
    - linters:
        - prealloc
      path: pkg/swarmkit/executor\.go
    - linters:
        - prealloc
      path: pkg/storage/
    - linters:
        - prealloc
      path: pkg/image/wrapper\.go
    # noctx in legacy test helpers
    - linters:
        - noctx
      path: pkg/lifecycle/
    - linters:
        - noctx
      path: pkg/health/
    # Pre-existing ineffassign in lifecycle tests
    - linters:
        - ineffassign
      path: pkg/lifecycle/