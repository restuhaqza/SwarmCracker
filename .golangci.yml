run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - govet
    - staticcheck
    - ineffassign
    - typecheck
    - errcheck
    - gofmt
    - revive
    - gocyclo

linters-settings:
  gocyclo:
    min-complexity: 20
  revive:
    rules:
      - name: exported
        disabled: true
  errcheck:
    check-type-assertions: true
    check-blank: false

issues:
  max-issues-per-linter: 50
  max-same-issues: 10