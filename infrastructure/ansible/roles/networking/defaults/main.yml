---
# Networking Role - Default Variables

# Bridge
network_bridge_name: "swarm-br0"
network_bridge_ip: "172.20.0.1"
network_bridge_subnet: "172.20.0.0/24"

# GRE tunnel for cross-node L2 connectivity
network_gre_enabled: false
network_gre_tunnel_name: "gre-cross"

# VXLAN overlay (proper L2 — handles broadcasts/ARP)
network_vxlan_enabled: true
network_vxlan_vni: 100
network_vxlan_port: 4789

# NAT for VM outbound access
network_nat_enabled: true
network_nat_interface: "{{ ansible_default_ipv4.interface | default('eth0') }}"

# VM IP assignment base
network_vm_ip_base: "172.20.0"
network_vm_ip_start: 10
