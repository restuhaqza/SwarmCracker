# CNI Plugin Installation Role Defaults

# CNI version
cni_version: "v1.5.0"

# CNI plugin directory
cni_plugin_dir: "/opt/cni/bin"

# CNI config directory
cni_config_dir: "/etc/cni/net.d"

# CNI download URL
cni_download_url: "https://github.com/containernetworking/plugins/releases/download/{{ cni_version }}/cni-plugins-linux-amd64-{{ cni_version }}.tgz"

# CNI temporary download path
cni_download_path: "/tmp/cni-plugins-{{ cni_version }}.tgz"

# Required CNI plugins (validated)
cni_required_plugins:
  - bridge
  - host-local
  - loopback

# Optional CNI plugins
cni_optional_plugins:
  - portmap
  - firewall
  - bandwidth

# Network configuration
cni_subnet_pool: "10.0.0.0/8"
cni_subnet_size: 24
cni_vxlan_port: 4789

# Create default loopback config
cni_create_loopback_config: true