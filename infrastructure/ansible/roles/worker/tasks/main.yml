---
# Worker Role - Tasks

- name: Download SwarmCracker release
  get_url:
    url: "{{ swarmcracker_download_url }}/{{ swarmcracker_tarball }}"
    dest: "/tmp/{{ swarmcracker_tarball }}"
    mode: "0644"
  register: download_result
  retries: 3
  delay: 5
  until: download_result is success
  when: swarmcracker_binary_source == "release"
  tags: [binaries]

- name: Create extraction directory
  file:
    path: /tmp/swarmcracker-extract
    state: directory
    mode: "0755"
  when: swarmcracker_binary_source == "release"

- name: Extract SwarmCracker binaries
  unarchive:
    src: "/tmp/{{ swarmcracker_tarball }}"
    dest: /tmp/swarmcracker-extract
    remote_src: yes
  when: swarmcracker_binary_source == "release"

- name: Install SwarmCracker binaries
  copy:
    src: "/tmp/swarmcracker-extract/swarmcracker-{{ swarmcracker_version }}-linux-amd64/{{ item }}"
    dest: "{{ swarmcracker_install_dir }}/{{ item }}"
    mode: "0755"
    remote_src: yes
  loop:
    - swarmcracker
    - swarmd-firecracker
    - swarmcracker-agent
  when: swarmcracker_binary_source == "release"

- name: Get join token from manager
  block:
    - name: Read join token from manager state
      shell: cat {{ swarmcracker_state_dir }}/manager/join-tokens.txt 2>/dev/null | grep WORKER_TOKEN | cut -d= -f2
      delegate_to: "{{ groups['managers'][0] }}"
      run_once: true
      register: manager_token_result
      changed_when: false
      failed_when: false

    - name: Set join token from manager
      set_fact:
        worker_join_token: "{{ manager_token_result.stdout | trim }}"
      when: manager_token_result.stdout is defined and manager_token_result.stdout | length > 0
  rescue:
    - name: Use fallback join token from inventory
      set_fact:
        worker_join_token: "{{ worker_join_token }}"
      when: worker_join_token is defined and worker_join_token | length > 0

- name: Fail if no join token available
  fail:
    msg: |
      No worker join token available. Either:
      1. Ensure manager is running and has generated tokens
      2. Set worker_join_token in inventory/group_vars
  when: worker_join_token is not defined or worker_join_token | length == 0

- name: Create SwarmCracker worker config
  template:
    src: worker-config.yaml.j2
    dest: "{{ swarmcracker_config_dir }}/worker-config.yaml"
    owner: root
    group: root
    mode: "0644"

- name: Create systemd service for SwarmKit worker
  template:
    src: swarmd-worker.service.j2
    dest: /etc/systemd/system/swarmd-worker.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart swarmd-worker

- name: Enable and start SwarmKit worker
  systemd:
    name: swarmd-worker
    state: started
    enabled: yes
    daemon_reload: yes
