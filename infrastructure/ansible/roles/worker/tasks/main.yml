---
# Worker Role - Tasks

- name: Download SwarmCracker release
  get_url:
    url: "{{ swarmcracker_download_url }}/{{ swarmcracker_tarball }}"
    dest: "/tmp/{{ swarmcracker_tarball }}"
    mode: '0644'
  register: download_result
  retries: 3
  delay: 5
  until: download_result is success

- name: Extract SwarmCracker binaries
  unarchive:
    src: "/tmp/{{ swarmcracker_tarball }}"
    dest: /tmp/swarmcracker-extract
    remote_src: yes
    creates: /tmp/swarmcracker-extract/swarmcracker

- name: Install SwarmCracker binaries
  copy:
    src: "/tmp/swarmcracker-extract/{{ item }}"
    dest: "{{ swarmcracker_install_dir }}/{{ item }}"
    mode: '0755'
    remote_src: yes
  loop:
    - swarmcracker
    - swarmd-firecracker
    - swarmcracker-agent

- name: Download Firecracker kernel
  get_url:
    url: "{{ swarmcracker_kernel_url }}"
    dest: "{{ swarmcracker_kernel_path }}"
    mode: '0644'
  when: swarmcracker_kernel_path is defined

- name: Create SwarmCracker worker config
  template:
    src: worker-config.yaml.j2
    dest: "{{ swarmcracker_config_dir }}/worker-config.yaml"
    owner: root
    group: root
    mode: '0644'
  notify: restart swarmd-worker

- name: Create systemd service for SwarmKit worker
  template:
    src: swarmd-worker.service.j2
    dest: /etc/systemd/system/swarmd-worker.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd
    - restart swarmd-worker

- name: Enable and start SwarmKit worker
  systemd:
    name: swarmd-worker
    state: started
    enabled: yes
    daemon_reload: yes

- name: Wait for worker to connect to manager
  wait_for:
    timeout: 60
  delegate_to: "{{ groups['managers'][0] }}"
  run_once: true

- name: Verify worker joined cluster
  command: swarmctl node ls
  delegate_to: "{{ groups['managers'][0] }}"
  register: node_list
  changed_when: false
  run_once: true

- name: Display worker status
  debug:
    msg: "Worker {{ inventory_hostname }} successfully joined cluster"
