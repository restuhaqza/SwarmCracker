---
# Manager Role - Tasks

- name: Install Go (required for swarmctl)
  package:
    name: golang-go
    state: present
  when: ansible_os_family == "Debian"

- name: Clone SwarmKit repository (for swarmctl)
  git:
    repo: 'https://github.com/moby/swarmkit.git'
    dest: /tmp/swarmkit
    version: master
    depth: 1
  register: swarmkit_clone

- name: Build swarmctl (optional - may fail on older Go versions)
  command: go build -o /usr/local/bin/swarmctl ./cmd/swarmctl
  args:
    chdir: /tmp/swarmkit
  environment:
    CGO_ENABLED: "0"
  register: swarmctl_build
  failed_when: false
  changed_when: swarmctl_build.rc == 0
  when: swarmkit_clone.changed

- name: Verify swarmctl installation
  command: swarmctl version
  register: swarmctl_version
  changed_when: false
  failed_when: false

- name: Download SwarmCracker release
  get_url:
    url: "{{ swarmcracker_download_url }}/{{ swarmcracker_tarball }}"
    dest: "/tmp/{{ swarmcracker_tarball }}"
    mode: '0644'
  register: download_result
  retries: 3
  delay: 5
  until: download_result is success

- name: Create extraction directory
  file:
    path: /tmp/swarmcracker-extract
    state: directory
    mode: '0755'

- name: Extract SwarmCracker binaries
  unarchive:
    src: "/tmp/{{ swarmcracker_tarball }}"
    dest: /tmp/swarmcracker-extract
    remote_src: yes

- name: Install SwarmCracker binaries
  copy:
    src: "/tmp/swarmcracker-extract/swarmcracker-{{ swarmcracker_version }}-linux-amd64/{{ item }}"
    dest: "{{ swarmcracker_install_dir }}/{{ item }}"
    mode: '0755'
    remote_src: yes
  loop:
    - swarmcracker
    - swarmd-firecracker
    - swarmcracker-agent

- name: Download Firecracker kernel (optional)
  get_url:
    url: "{{ swarmcracker_kernel_url }}"
    dest: "{{ swarmcracker_kernel_path }}"
    mode: '0644'
  when: swarmcracker_kernel_path is defined
  failed_when: false
  ignore_errors: yes

- name: Show kernel download status
  debug:
    msg: "Firecracker kernel not downloaded automatically. Please download manually from https://s3.amazonaws.com/spec.ccfc.min/img/kernels/ to {{ swarmcracker_kernel_path }}"

- name: Create SwarmCracker manager config
  template:
    src: manager-config.yaml.j2
    dest: "{{ swarmcracker_config_dir }}/manager-config.yaml"
    owner: root
    group: root
    mode: '0644'
  notify: restart swarmd-manager

- name: Create systemd service for SwarmKit manager
  template:
    src: swarmd-manager.service.j2
    dest: /etc/systemd/system/swarmd-manager.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd
    - restart swarmd-manager

- name: Enable and start SwarmKit manager
  systemd:
    name: swarmd-manager
    state: started
    enabled: yes
    daemon_reload: yes

- name: Wait for manager to be ready
  wait_for:
    port: "{{ manager_port }}"
    host: "{{ manager_bind_address }}"
    timeout: 60
  register: manager_ready
  retries: 5
  delay: 10
  until: manager_ready is success

- name: Get cluster join token
  command: swarmctl cluster inspect --show-join-token
  register: join_token
  changed_when: false
  when: manager_ready is success

- name: Display join token
  debug:
    var: join_token.stdout
  when: join_token is defined
