---
# Manager Role - Default Variables

manager_bind_address: "0.0.0.0"
manager_port: "{{ swarmcracker_manager_port }}"
manager_state_dir: "{{ swarmcracker_state_dir }}/manager"

# Advertise address - must be set to actual IP for workers to connect
# If not set, will auto-detect from ansible_default_ipv4.address
manager_advertise_address: "{{ ansible_default_ipv4.address | default('0.0.0.0') }}"
manager_advertise_port: "{{ manager_port }}"

# SwarmCracker download configuration
swarmcracker_version: "v0.7.0"
swarmcracker_download_url: "https://github.com/restuhaqza/SwarmCracker/releases/download/{{ swarmcracker_version }}"
swarmcracker_tarball: "swarmcracker-{{ swarmcracker_version }}-linux-amd64.tar.gz"
swarmcracker_install_dir: /usr/local/bin
swarmcracker_manager_port: 4242
swarmcracker_kernel_url: "https://s3.amazonaws.com/spec.ccfc.min/firecracker-ci/v1.15/x86_64/vmlinux-6.1.155"
swarmcracker_kernel_path: /usr/share/firecracker/vmlinux
swarmcracker_state_dir: /var/lib/swarmcracker
swarmcracker_rootfs_dir: /var/lib/firecracker/rootfs
swarmcracker_socket_dir: /var/run/firecracker
swarmcracker_config_dir: /etc/swarmcracker
swarmcracker_log_dir: /var/log/swarmcracker