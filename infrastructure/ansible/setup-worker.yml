---
# SwarmCracker Worker Setup
# Deploys SwarmKit worker node and joins to manager

- name: Setup SwarmCracker Worker
  hosts: workers
  become: yes
  gather_facts: yes

  vars:
    manager_host: "{{ hostvars[groups['managers'][0]]['ansible_host'] }}"
    join_token: ""

  pre_tasks:
    - name: Verify manager_host is provided
      assert:
        that:
          - manager_host is defined
          - manager_host | length > 0
        msg: "manager_host variable is required. Use: --extra-vars 'manager_host=<manager-ip>'"

    - name: Get join token if not provided
      command: swarmctl cluster inspect --show-join-token
      register: join_token_result
      delegate_to: "{{ groups['managers'][0] }}"
      run_once: true
      when: join_token == "" or join_token | length == 0
      changed_when: false

    - name: Set join token
      set_fact:
        join_token: "{{ join_token_result.stdout }}"
      when: join_token == "" or join_token | length == 0

  roles:
    - role: common
      tags: ['common', 'prerequisites']

    - role: worker
      tags: ['worker']

  post_tasks:
    - name: Verify worker joined cluster
      command: swarmctl node ls
      register: node_list
      delegate_to: "{{ groups['managers'][0] }}"
      changed_when: false
      run_once: true

    - name: Display cluster status
      debug:
        msg: |
          Worker setup completed!

          Cluster Nodes:
          {{ node_list.stdout }}

          To verify worker status:
            systemctl status swarmd-firecracker

          To deploy a test service:
            swarmctl service create --name test --image nginx:alpine --replicas 2
