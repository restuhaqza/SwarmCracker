---
# SwarmCracker Cluster Teardown
# WARNING: This will remove all SwarmCracker services and data!

- name: Teardown SwarmCracker Cluster
  hosts: swarmcracker
  become: yes
  gather_facts: yes

  vars:
    confirm_teardown: false  # Set to true to confirm

  pre_tasks:
    - name: Confirm teardown
      fail:
        msg: "Teardown cancelled. Set confirm_teardown=true to proceed."
      when: not confirm_teardown

  tasks:
    - name: Stop SwarmCracker services
      systemd:
        name: "{{ item }}"
        state: stopped
        enabled: no
      loop:
        - swarmd-worker
        - swarmd-manager
      failed_when: false

    - name: Remove systemd services
      file:
        path: "/etc/systemd/system/{{ item }}.service"
        state: absent
      loop:
        - swarmd-worker
        - swarmd-manager
      notify: reload systemd

    - name: Remove SwarmCracker binaries
      file:
        path: "{{ swarmcracker_install_dir }}/{{ item }}"
        state: absent
      loop:
        - swarmcracker
        - swarmd-firecracker
        - swarmcracker-agent

    - name: Remove SwarmCracker directories
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ swarmcracker_state_dir }}"
        - "{{ swarmcracker_rootfs_dir }}"
        - "{{ swarmcracker_socket_dir }}"
        - "{{ swarmcracker_config_dir }}"
        - "{{ swarmcracker_log_dir }}"

    - name: Remove network bridge
      command: ip link delete {{ swarmcracker_bridge_name }}
      failed_when: false
      changed_when: true

    - name: Remove VXLAN interface
      command: ip link delete vxlan0
      failed_when: false
      changed_when: true

    - name: Flush iptables rules
      iptables:
        chain: "{{ item }}"
        flush: yes
      loop:
        - FORWARD
        - POSTROUTING
      failed_when: false

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes

  post_tasks:
    - name: Display teardown status
      debug:
        msg: |
          SwarmCracker teardown completed!

          The following have been removed:
          - SwarmCracker binaries
          - Systemd services
          - Configuration files
          - State directories
          - Network bridges

          To reinstall, run:
            ansible-playbook -i inventory/production site.yml
