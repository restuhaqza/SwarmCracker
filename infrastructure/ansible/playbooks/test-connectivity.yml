---
# Test cross-node MicroVM connectivity
#
# Usage:
#   ansible-playbook -i inventory/virtualbox-fresh playbooks/test-connectivity.yml

- name: Gather VM network info
  hosts: workers
  become: yes
  gather_facts: no
  tasks:
    - name: Show bridge and ARP on {{ inventory_hostname }}
      shell: |
        echo "=== Bridge: swarm-br0 ==="
        ip addr show swarm-br0 2>/dev/null | grep inet
        echo "=== TAP interfaces ==="
        ip link show | grep -E 'tap-|swarm-br'
        echo "=== GRE tunnel ==="
        ip link show gre-cross 2>/dev/null || echo "(no GRE)"
        echo "=== ARP ==="
        ip neigh show dev swarm-br0 2>/dev/null || echo "(empty)"
      register: net_info
      changed_when: false

    - name: Display network info
      debug:
        msg: "{{ net_info.stdout_lines }}"

- name: Test cross-node ping
  hosts: workers
  become: yes
  gather_facts: no
  tasks:
    - name: Ping VM IPs from {{ inventory_hostname }}
      shell: |
        echo "=== Pinging from {{ inventory_hostname }} ==="
        for i in 11 21; do
          ip="172.20.0.$i"
          result=$(ping -c 1 -W 1 "$ip" 2>&1)
          if echo "$result" | grep -q "1 received"; then
            echo "  ✅ $ip — reachable"
          else
            echo "  ❌ $ip — unreachable"
          fi
        done
      register: ping_results
      changed_when: false
      ignore_errors: yes

    - name: Display ping results
      debug:
        msg: "{{ ping_results.stdout_lines }}"

- name: Cross-node summary
  hosts: swarm-worker-1
  become: yes
  gather_facts: no
  tasks:
    - name: Ping VM2 from worker-1 host
      shell: ping -c 3 -W 2 172.20.0.21 2>&1
      register: cross_ping
      ignore_errors: yes

    - name: Ping VM1 from worker-2 host
      shell: ping -c 3 -W 2 172.20.0.11 2>&1
      delegate_to: swarm-worker-2
      register: cross_ping_reverse
      ignore_errors: yes

    - name: Display topology
      debug:
        msg: |
          ╔══════════════════════════════════════════════════╗
          ║     SwarmCracker MicroVM Cluster Topology       ║
          ╠══════════════════════════════════════════════════╣
          ║                                                  ║
          ║  ┌──────────────┐     GRE      ┌──────────────┐ ║
          ║  │  Worker-1    │◄───────────►│  Worker-2    │ ║
          ║  │ 192.168.56.11│             │ 192.168.56.12│ ║
          ║  │              │             │              │ ║
          ║  │  VM-1        │             │  VM-2        │ ║
          ║  │ 172.20.0.11  │             │ 172.20.0.21  │ ║
          ║  │              │             │              │ ║
          ║  │ swarm-br0    │◄───────────►│ swarm-br0    │ ║
          ║  │ 172.20.0.1   │   L2 bridge │ 172.20.0.1   │ ║
          ║  └──────────────┘             └──────────────┘ ║
          ║                                                  ║
          ║  W1→VM2 (cross): {{ '✅' if cross_ping.rc == 0 else '❌' }}                          ║
          ║  W2→VM1 (reverse): {{ '✅' if cross_ping_reverse.rc == 0 else '❌' }}                         ║
          ╚══════════════════════════════════════════════════╝
