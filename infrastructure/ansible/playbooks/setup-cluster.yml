---
# SwarmCracker Full Cluster Setup
#
# Usage:
#   ansible-playbook -i inventory/virtualbox-fresh playbooks/setup-cluster.yml
#
# Deploys: common prerequisites → manager → workers → firecracker → networking

- name: SwarmCracker — Prerequisites
  hosts: swarmcracker
  become: yes
  gather_facts: yes
  tasks:
    - name: "✅ Cluster prerequisites"
      debug:
        msg: "Setting up prerequisites on all nodes..."

- name: SwarmCracker — Common
  import_playbook: cluster-common.yml

- name: SwarmCracker — Manager
  import_playbook: cluster-manager.yml

- name: SwarmCracker — Workers
  import_playbook: cluster-workers.yml

- name: SwarmCracker — Firecracker (workers only)
  hosts: workers
  become: yes
  gather_facts: no
  roles:
    - role: firecracker
      tags: [firecracker]

- name: SwarmCracker — Networking (workers only)
  hosts: workers
  become: yes
  gather_facts: no
  roles:
    - role: networking
      tags: [networking]

- name: SwarmCracker — Cluster Summary
  hosts: managers
  become: yes
  gather_facts: no
  tasks:
    - name: Wait for manager API
      wait_for:
        port: "{{ swarmcracker_manager_port }}"
        host: "0.0.0.0"
        timeout: 30
      ignore_errors: yes

    - name: Check manager service
      systemd:
        name: swarmd-manager
      register: mgr_status

    - name: Display cluster summary
      debug:
        msg: |
          ╔══════════════════════════════════════════════════╗
          ║     SwarmCracker Cluster — Deployment Complete   ║
          ╠══════════════════════════════════════════════════╣
          ║                                                  ║
          ║  Manager: {{ groups['managers'] | join(', ') }}     ║
          ║  Workers: {{ groups['workers'] | join(', ') }}   ║
          ║                                                  ║
          ║  Manager service: {{ 'running ✅' if mgr_status.status.ActiveState == 'active' else mgr_status.status.ActiveState }}  ║
          ║                                                  ║
          ║  Next: deploy MicroVMs                            ║
          ║  → ansible-playbook playbooks/deploy-microvms.yml ║
          ╚══════════════════════════════════════════════════╝
