---
# SwarmCracker — Full Cluster Setup
#
# Usage:
#   ansible-playbook -i inventory/virtualbox-fresh site.yml

# Phase 1: Common prerequisites on all nodes
- name: SwarmCracker — Common Prerequisites
  hosts: swarmcracker
  become: yes
  gather_facts: yes
  roles:
    - role: common
      tags: [common]

# Phase 2: Consul Service Discovery
- name: SwarmCracker — Consul Service Discovery
  hosts: swarmcracker
  become: yes
  gather_facts: yes
  vars:
    consul_server: "{{ inventory_hostname in groups['managers'] }}"
    consul_client: "{{ inventory_hostname in groups['workers'] }}"
  roles:
    - role: consul
      tags: [consul]

# Phase 3: Manager
- name: SwarmCracker — Manager
  hosts: managers
  become: yes
  gather_facts: no
  roles:
    - role: cni
      tags: [cni]
    - role: manager
      tags: [manager]

# Phase 4: Workers
- name: SwarmCracker — Workers
  hosts: workers
  become: yes
  gather_facts: no
  roles:
    - role: worker
      tags: [worker]

# Phase 5: Firecracker on workers
- name: SwarmCracker — Firecracker
  hosts: workers
  become: yes
  gather_facts: no
  roles:
    - role: firecracker
      tags: [firecracker]

# Phase 6: Networking on workers
- name: SwarmCracker — Networking
  hosts: workers
  become: yes
  gather_facts: no
  roles:
    - role: networking
      tags: [networking]

# Phase 7: Summary
- name: SwarmCracker — Summary
  hosts: managers
  become: yes
  gather_facts: no
  tasks:
    - name: Check manager service
      systemd:
        name: swarmd-manager
      register: mgr_status
      failed_when: false

    - name: Check Consul service
      systemd:
        name: consul
      register: consul_status
      failed_when: false

    - name: Display summary
      debug:
        msg: |
          ╔══════════════════════════════════════════════════╗
          ║     SwarmCracker Cluster — Deployment Complete   ║
          ╠══════════════════════════════════════════════════╣
          ║                                                  ║
          ║  Manager: {{ groups['managers'] | join(', ') }}     ║
          ║  Workers: {{ groups['workers'] | join(', ') }}    ║
          ║                                                  ║
          ║  Manager Status: {{ mgr_status.status.ActiveState | default('unknown') }}  ║
          ║  Consul Status: {{ consul_status.status.ActiveState | default('unknown') }}  ║
          ║                                                  ║
          ║  Consul UI: http://{{ hostvars[groups['managers'][0]]['ansible_host'] }}:8500  ║
          ║                                                  ║
          ║  Next:                                            ║
          ║  → ansible-playbook playbooks/deploy-microvms.yml ║
          ╚══════════════════════════════════════════════════╝